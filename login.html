<!-- Title -->
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-8 tracking-tight">The Odyssey Begins</h1>
<p class="font-body-md text-body-md text-on-surface-variant mb-12 max-w-[80%]">Enter your credentials to continue your journey into structural connectivity.</p>
<!-- Form -->
<form action="#" class="w-full flex flex-col gap-6" method="POST">
<!-- Email Field -->
<div class="flex flex-col gap-2 relative group">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest" for="email">Email Address</label>
<input class="sharp-input w-full bg-surface-container-highest border-t-0 border-l-0 border-r-0 border-b border-outline-variant text-on-surface font-body-md text-body-md px-0 py-3 focus:ring-0 focus:border-b-primary focus:bg-surface-container-low transition-colors duration-300 placeholder:text-surface-variant" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
<!-- Subtle glowing particle trail simulation via CSS gradient on focus -->
<div class="absolute bottom-0 left-0 h-[2px] w-0 bg-gradient-to-r from-transparent via-primary to-transparent group-focus-within:w-full transition-all duration-500 ease-out opacity-0 group-focus-within:opacity-100"></div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2 relative group mt-4">
<div class="flex justify-between items-center">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:text-primary-fixed transition-colors" href="#">Forgot?</a>
</div>
<input class="sharp-input w-full bg-surface-container-highest border-t-0 border-l-0 border-r-0 border-b border-outline-variant text-on-surface font-body-md text-body-md px-0 py-3 focus:ring-0 focus:border-b-primary focus:bg-surface-container-low transition-colors duration-300 placeholder:text-surface-variant" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<!-- Subtle glowing particle trail simulation via CSS gradient on focus -->
<div class="absolute bottom-0 left-0 h-[2px] w-0 bg-gradient-to-r from-transparent via-primary to-transparent group-focus-within:w-full transition-all duration-500 ease-out opacity-0 group-focus-within:opacity-100"></div>
</div>
<!-- Action Button -->
<button class="bevel-button mt-8 w-full bg-gradient-to-r from-primary-container to-inverse-primary text-on-primary font-label-md text-label-md uppercase tracking-widest py-4 px-6 hover:brightness-110 active:brightness-90 transition-all duration-300 flex items-center justify-between group" type="button" onclick="loginUser()">
<span>Join the Odyssey</span>
<span class="material-symbols-outlined transform group-hover:translate-x-1 transition-transform duration-300 text-on-primary" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<div class="mt-8 w-full border-t border-outline-variant/30 pt-6 flex justify-center">
<p class="font-label-sm text-label-sm text-on-surface-variant">
                    New to Odyssey? <a class="text-primary hover:underline ml-1" href="#">Request Access</a>
</p>
</div>
</div>
</div>
<script>
  async function loginUser() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
      const res = await fetch("http://localhost:5000/api/login", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (res.ok) {
        // store token
        localStorage.setItem("token", data.token);

        alert("Login successful ✅");

        // redirect to dashboard
        window.location.href = "Dashboard.html";
      } else {
        alert(data.message);
      }

    } catch (err) {
      console.error(err);
      alert("Something went wrong");
    }
  }
</script>
