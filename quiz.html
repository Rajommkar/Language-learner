<!DOCTYPE html>
<html class="dark">
<head>
  <script>
    if (!localStorage.getItem("token")) {
      window.location.href = "login.html";
    }
  </script>
  <meta charset="UTF-8" />
  <title>Translify Practice</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="config.js"></script>
  <style>
    @keyframes shake {
        0% { transform: translateX(0); }
        25% { transform: translateX(-6px); }
        50% { transform: translateX(6px); }
        75% { transform: translateX(-6px); }
        100% { transform: translateX(0); }
    }
    .animate-shake {
        animation: shake 0.35s ease;
    }
    @keyframes xpFloat {
        0% {
            opacity: 0;
            transform: translateY(20px) scale(0.9);
        }
        20% {
            opacity: 1;
            transform: translateY(0px) scale(1);
        }
        100% {
            opacity: 0;
            transform: translateY(-40px) scale(1.05);
        }
    }
    .animate-xp {
        animation: xpFloat 1.4s ease forwards;
    }
    @keyframes fadeSlideUp {
        from {
            opacity: 0;
            transform: translateY(12px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    .option-enter {
        animation: fadeSlideUp 0.35s ease forwards;
        opacity: 0; /* starts hidden until animation fires */
    }
  </style>
</head>

<body class="bg-[#0c0e10] text-white min-h-screen flex items-center justify-center relative overflow-hidden">

<!-- Atmospheric Background -->
<div class="absolute inset-0 overflow-hidden pointer-events-none">

  <div class="absolute top-[-200px] left-[-150px] w-[500px] h-[500px]
    bg-blue-500/10 blur-3xl rounded-full">
  </div>

  <div class="absolute bottom-[-250px] right-[-200px] w-[600px] h-[600px]
    bg-indigo-500/10 blur-3xl rounded-full">
  </div>

  <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(255,255,255,0.03)_0%,transparent_70%)]">
  </div>

</div>

  <div class="w-full max-w-3xl p-10 backdrop-blur-2xl bg-white/[0.03] border border-white/10 rounded-3xl shadow-2xl relative z-10">

    <a href="Dashboard.html" class="text-sm text-blue-400 hover:underline mb-4 inline-block">
      ← Back to Dashboard
    </a>

    <!-- Lesson Title -->
    <h2 id="lessonTitle" class="text-xl font-semibold mb-6 text-center text-white/80">
      Loading...
    </h2>

    <!-- Question Progress -->
    <p class="text-center text-sm opacity-70 mb-2">
      Question <span id="qIndex"></span> / <span id="totalQ"></span>
    </p>

    <!-- Premium Progress Bar -->
    <div class="w-full h-2 bg-white/5 rounded-full overflow-hidden mb-8">
      <div 
        id="progressBar"
        class="h-full bg-blue-400 transition-all duration-500 ease-out"
        style="width: 0%"
      ></div>
    </div>

    <!-- Question -->
    <p id="questionText" class="text-2xl font-medium text-center mb-10">
      ...
    </p>

    <!-- Options -->
    <div id="options" class="flex flex-col gap-4"></div>

    <div
      id="xpPopup"
      class="fixed top-24 right-10 text-green-400 text-3xl font-bold opacity-0 pointer-events-none z-50"
    >
      +10 XP
    </div>

    <!-- Result -->
    <p id="result" class="text-center mt-6 text-lg"></p>

  </div>

<script>
let lesson = null;
let currentQuestionIndex = 0;
let correctAnswers = 0;

function showXP(amount) {
    const popup = document.getElementById("xpPopup");
    popup.innerText = `+${amount} XP`;
    popup.classList.remove("animate-xp");
    void popup.offsetWidth; // trigger reflow
    popup.classList.add("animate-xp");
}

async function loadLesson() {
  try {
    const token = localStorage.getItem("token");
    if (!token) {
      window.location.href = "login.html";
      return;
    }

    const res = await fetch(`${BASE_URL}/api/lessons`, {
      headers: {
        "Authorization": "Bearer " + token
      }
    });
    if (!res.ok) {
      const data = await res.json();
      throw new Error(data.message || "Request failed");
    }
    const data = await res.json();

    lesson = data[0];
    // Randomize question order to increase replayability
    lesson.questions = lesson.questions.sort(() => Math.random() - 0.5);
    showQuestion();
  } catch (err) {
    console.error(err);
    document.getElementById("questionText").innerText = "⚠️ Something went wrong. Try again.";
  }
}

function showQuestion() {
  const q = lesson.questions[currentQuestionIndex];

  document.getElementById("lessonTitle").innerText = lesson.title;
  document.getElementById("qIndex").innerText = currentQuestionIndex + 1;
  document.getElementById("totalQ").innerText = lesson.questions.length;
  document.getElementById("questionText").innerText = q.question;

  // Update progress bar
  const progressPercent = (currentQuestionIndex / lesson.questions.length) * 100;
  document.getElementById("progressBar").style.width = `${progressPercent}%`;

  const optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";

  const shuffledOptions = [...q.options].sort(() => Math.random() - 0.5);
  shuffledOptions.forEach(option => {
    const btn = document.createElement("div");
    btn.className = `
      option-enter
      p-5
      border
      border-white/10
      rounded-2xl
      cursor-pointer
      bg-white/[0.02]
      hover:bg-white/[0.05]
      hover:border-blue-400/60
      hover:shadow-lg
      hover:shadow-blue-500/10
      hover:-translate-y-1
      active:scale-[0.98]
      transition-all
      duration-300
      text-lg
      font-medium
      backdrop-blur-sm
    `;

    btn.innerText = option;

    btn.onclick = () => {
      btn.style.transform = "scale(0.97)";
      setTimeout(() => submitAnswer(option), 100);
    };

    optionsDiv.appendChild(btn);
  });
}

async function submitAnswer(answer) {
  const optionsDiv = document.getElementById("options");
  optionsDiv.style.pointerEvents = "none";
  optionsDiv.style.opacity = "0.7";

  try {
    const token = localStorage.getItem("token");
    if (!token) {
      window.location.href = "login.html";
      return;
    }

    const res = await fetch(`${BASE_URL}/api/submit`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({
        lessonId: lesson._id,
        questionIndex: currentQuestionIndex,
        selectedAnswer: answer,
        questionText: lesson.questions[currentQuestionIndex].question
      })
    });

    if (!res.ok) {
      const data = await res.json();
      throw new Error(data.message || "Request failed");
    }
    const data = await res.json();

    const result = document.getElementById("result");
    result.style.transition = "all 0.3s ease";
    result.style.opacity = "0";

    const buttons = document.querySelectorAll("#options div");
    
    // Step 4 - Fade non-selected options for focus
    buttons.forEach(btn => {
      if (btn.innerText !== answer) {
        btn.style.opacity = "0.5";
      }
    });

    if (data.correct) {
      correctAnswers++;
      buttons.forEach(btn => {
        if (btn.innerText === answer) {
          btn.classList.add(
            "bg-green-500/20",
            "border-green-400",
            "shadow-lg",
            "shadow-green-500/20"
          );
        }
      });

      showXP(data.xpEarned || 10);

      result.innerHTML = `✅ Correct<br>XP: ${data.xp} | Progress: ${data.progress}%`;
      result.className = "text-green-400 text-center mt-6";
    } else {
      buttons.forEach(btn => {
        // wrong selected answer
        if (btn.innerText === answer) {
          btn.classList.add(
            "bg-red-500/20",
            "border-red-400",
            "animate-shake"
          );
        }

        // show correct answer
        if (
          btn.innerText ===
          lesson.questions[currentQuestionIndex].correctAnswer
        ) {
          btn.classList.add(
            "bg-green-500/20",
            "border-green-400"
          );
        }
      });

      result.innerHTML = `❌ Wrong<br>XP: ${data.xp} | Progress: ${data.progress}%`;
      result.innerHTML += `<br>Correct: ${lesson.questions[currentQuestionIndex].correctAnswer}`;
      result.className = "text-red-400 text-center mt-6";
    }

    setTimeout(() => {
      result.style.opacity = "1";
    }, 10);

    currentQuestionIndex++;

    if (currentQuestionIndex < lesson.questions.length) {
      setTimeout(() => {
        result.innerText = "";
        showQuestion();
        optionsDiv.style.pointerEvents = "auto";
        optionsDiv.style.opacity = "1";
      }, 1200);
    } else {
      document.getElementById("progressBar").style.width = "100%";
      
      const totalQuestions = lesson.questions.length;
      const accuracy = Math.floor((correctAnswers / totalQuestions) * 100);
      
      document.getElementById("options").innerHTML = "";
      document.getElementById("questionText").innerHTML = `
        <div class="flex flex-col items-center gap-6 py-8">
            <div class="text-3xl md:text-5xl">🏆</div>
            <h2 class="text-4xl font-bold text-white">
                Lesson Complete
            </h2>
            <p class="text-white/70 text-lg">
                Excellent work. Your linguistic mastery is improving.
            </p>
            <div class="grid grid-cols-3 gap-6 w-full max-w-xl mt-6">
                <div class="bg-white/5 border border-white/10 rounded-xl p-6 text-center">
                    <p class="text-sm text-white/50 mb-2">Accuracy</p>
                    <p class="text-3xl font-bold text-green-400">
                        ${accuracy}%
                    </p>
                </div>
                <div class="bg-white/5 border border-white/10 rounded-xl p-6 text-center">
                    <p class="text-sm text-white/50 mb-2">XP Total</p>
                    <p class="text-3xl font-bold text-blue-400">
                        ${data.xp}
                    </p>
                </div>
                <div class="bg-white/5 border border-white/10 rounded-xl p-6 text-center">
                    <p class="text-sm text-white/50 mb-2">Questions</p>
                    <p class="text-3xl font-bold text-white">
                        ${totalQuestions}
                    </p>
                </div>
            </div>
            <div class="flex gap-4 mt-8">
                <a
                  href="Dashboard.html"
                  class="px-6 py-3 bg-white/10 border border-white/10 rounded-xl hover:bg-white/15 transition-all"
                >
                  Return Dashboard
                </a>
                <button
                  onclick="location.reload()"
                  class="px-6 py-3 bg-blue-500 text-white rounded-xl hover:bg-blue-400 transition-all"
                >
                  Replay Lesson
                </button>
            </div>
        </div>
      `;
    }
  } catch (err) {
    console.error(err);
    const result = document.getElementById("result");
    result.innerHTML = "⚠️ Something went wrong. Try again.";
    result.className = "text-red-400 text-center mt-6";
    result.style.opacity = "1";
    optionsDiv.style.pointerEvents = "auto";
    optionsDiv.style.opacity = "1";
  }
}

loadLesson();
</script>
</body>
</html>
