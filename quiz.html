<!DOCTYPE html>
<html class="dark">
<head>
  <script>
    if (!localStorage.getItem("token")) {
      window.location.href = "login.html";
    }
  </script>
  <meta charset="UTF-8" />
  <title>Translify Practice</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="config.js"></script>
</head>

<body class="bg-[#0c0e10] text-white min-h-screen flex items-center justify-center">

  <div class="w-full max-w-2xl p-8 backdrop-blur-xl bg-white/5 border border-white/10 rounded-xl">

    <a href="Dashboard.html" class="text-sm text-blue-400 hover:underline mb-4 inline-block">
      ← Back to Dashboard
    </a>

    <!-- Lesson Title -->
    <h2 id="lessonTitle" class="text-xl font-semibold mb-6 text-center text-white/80">
      Loading...
    </h2>

    <!-- Question Progress -->
    <p class="text-center text-sm opacity-70 mb-2">
      Question <span id="qIndex"></span> / <span id="totalQ"></span>
    </p>

    <!-- Premium Progress Bar -->
    <div class="w-full h-2 bg-white/5 rounded-full overflow-hidden mb-8">
      <div 
        id="progressBar"
        class="h-full bg-blue-400 transition-all duration-500 ease-out"
        style="width: 0%"
      ></div>
    </div>

    <!-- Question -->
    <p id="questionText" class="text-2xl font-medium text-center mb-10">
      ...
    </p>

    <!-- Options -->
    <div id="options" class="flex flex-col gap-4"></div>

    <!-- Result -->
    <p id="result" class="text-center mt-6 text-lg"></p>

  </div>

<script>
let lesson = null;
let currentQuestionIndex = 0;

async function loadLesson() {
  try {
    const token = localStorage.getItem("token");
    if (!token) {
      window.location.href = "login.html";
      return;
    }

    const res = await fetch(`${BASE_URL}/api/lessons`, {
      headers: {
        "Authorization": "Bearer " + token
      }
    });
    if (!res.ok) {
      const data = await res.json();
      throw new Error(data.message || "Request failed");
    }
    const data = await res.json();

    lesson = data[0];
    // Randomize question order to increase replayability
    lesson.questions = lesson.questions.sort(() => Math.random() - 0.5);
    showQuestion();
  } catch (err) {
    console.error(err);
    document.getElementById("questionText").innerText = "⚠️ Something went wrong. Try again.";
  }
}

function showQuestion() {
  const q = lesson.questions[currentQuestionIndex];

  document.getElementById("lessonTitle").innerText = lesson.title;
  document.getElementById("qIndex").innerText = currentQuestionIndex + 1;
  document.getElementById("totalQ").innerText = lesson.questions.length;
  document.getElementById("questionText").innerText = q.question;

  // Update progress bar
  const progressPercent = (currentQuestionIndex / lesson.questions.length) * 100;
  document.getElementById("progressBar").style.width = `${progressPercent}%`;

  const optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";

  const shuffledOptions = [...q.options].sort(() => Math.random() - 0.5);
  shuffledOptions.forEach(option => {
    const btn = document.createElement("div");

    btn.className = `
      p-4 border border-white/10 rounded-lg cursor-pointer
      hover:bg-white/10 hover:border-blue-400
      transition-all duration-300
    `;

    btn.innerText = option;

    btn.onclick = () => {
      btn.style.transform = "scale(0.97)";
      setTimeout(() => submitAnswer(option), 100);
    };

    optionsDiv.appendChild(btn);
  });
}

async function submitAnswer(answer) {
  const optionsDiv = document.getElementById("options");
  optionsDiv.style.pointerEvents = "none";
  optionsDiv.style.opacity = "0.7";

  try {
    const token = localStorage.getItem("token");
    if (!token) {
      window.location.href = "login.html";
      return;
    }

    const res = await fetch(`${BASE_URL}/api/submit`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({
        lessonId: lesson._id,
        questionIndex: currentQuestionIndex,
        selectedAnswer: answer,
        questionText: lesson.questions[currentQuestionIndex].question
      })
    });

    if (!res.ok) {
      const data = await res.json();
      throw new Error(data.message || "Request failed");
    }
    const data = await res.json();

    const result = document.getElementById("result");
    result.style.transition = "all 0.3s ease";
    result.style.opacity = "0";

    if (data.correct) {
      const buttons = document.querySelectorAll("#options div");
      buttons.forEach(btn => {
        if (btn.innerText === answer) {
          btn.classList.add(
            "bg-green-500/20",
            "border-green-400",
            "shadow-lg",
            "shadow-green-500/20"
          );
        }
      });

      result.innerHTML = `✅ Correct<br>XP: ${data.xp} | Progress: ${data.progress}%`;
      result.className = "text-green-400 text-center mt-6";
    } else {
      result.innerHTML = `❌ Wrong<br>XP: ${data.xp} | Progress: ${data.progress}%`;
      result.innerHTML += `<br>Correct: ${lesson.questions[currentQuestionIndex].correctAnswer}`;
      result.className = "text-red-400 text-center mt-6";
    }

    setTimeout(() => {
      result.style.opacity = "1";
    }, 10);

    currentQuestionIndex++;

    if (currentQuestionIndex < lesson.questions.length) {
      setTimeout(() => {
        result.innerText = "";
        showQuestion();
        optionsDiv.style.pointerEvents = "auto";
        optionsDiv.style.opacity = "1";
      }, 1200);
    } else {
      document.getElementById("progressBar").style.width = "100%";
      document.getElementById("questionText").innerText = "🎉 Lesson Complete";
      document.getElementById("options").innerHTML = "";
    }
  } catch (err) {
    console.error(err);
    const result = document.getElementById("result");
    result.innerHTML = "⚠️ Something went wrong. Try again.";
    result.className = "text-red-400 text-center mt-6";
    result.style.opacity = "1";
    optionsDiv.style.pointerEvents = "auto";
    optionsDiv.style.opacity = "1";
  }
}

loadLesson();
</script>
</body>
</html>
