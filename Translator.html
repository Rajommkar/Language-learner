<script src="config.js"></script>
<script>
  let debounceTimer = null;
  const sourceLang = document.getElementById("sourceLang");
  const targetLang = document.getElementById("targetLang");
  const translateBtn = document.getElementById("translateBtn");

  // Auto-set target language from browser if supported
  const browserLang = navigator.language.slice(0, 2);
  const supportedTargetLangs = Array.from(targetLang.options).map(opt => opt.value);
  if (browserLang !== "en" && supportedTargetLangs.includes(browserLang)) {
    targetLang.value = browserLang;
  }

  function validateLanguages() {
    if (sourceLang.value === targetLang.value && sourceLang.value !== "auto") {
      translateBtn.disabled = true;
      translateBtn.innerText = "Choose Different Languages";
      translateBtn.style.opacity = "0.5";
    } else {
      translateBtn.disabled = false;
      translateBtn.innerText = "TRANSLATE";
      translateBtn.style.opacity = "1";
    }
  }

  sourceLang.addEventListener("change", validateLanguages);
  targetLang.addEventListener("change", validateLanguages);

  const inputText = document.getElementById("inputText");
  const charCount = document.getElementById("charCount");

  inputText.addEventListener("input", () => {
    const currentLength = inputText.value.length;
    charCount.innerText = `${currentLength} / 5000`;

    if (currentLength >= 5000) {
      charCount.style.color = "#ff4d4d"; // Red warning
    } else if (currentLength > 4000) {
      charCount.style.color = "#ffb347"; // Orange warning
    } else {
      charCount.style.color = "#a0a0a0"; // Standard gray
    }
  });

  const copyBtn = document.getElementById("copyBtn");
  const outputText = document.getElementById("outputText");

  copyBtn.addEventListener("click", async () => {
    const rawText = outputText.innerText.trim();
    if (!rawText || rawText === "Translation will appear here..." || rawText.startsWith("Translating")) {
      showToast("Nothing to copy.", "warning");
      return;
    }

    try {
      await navigator.clipboard.writeText(rawText);
      showToast("Copied Successfully", "check_circle");

      // Premium icon feedback
      copyBtn.innerHTML = '<span class="material-symbols-outlined text-green-400">check</span>';

      setTimeout(() => {
        copyBtn.innerHTML = '<span class="material-symbols-outlined">content_copy</span>';
      }, 1500);

    } catch (error) {
      showToast("Copy failed.", "error");
    }
  });

  const swapBtn = document.getElementById("swapBtn");

  swapBtn.addEventListener("click", () => {
    if (sourceLang.value === "auto") {
      showToast("Auto Detect cannot be swapped.", "warning");
      return;
    }

    // Swap languages
    const tempLang = sourceLang.value;
    sourceLang.value = targetLang.value;
    targetLang.value = tempLang;

    // Swap text values (safeguard against default placeholder)
    let currentOutput = outputText.innerText.trim();
    if (currentOutput === "Translation will appear here...") {
      currentOutput = "";
    }
    const tempText = inputText.value;
    inputText.value = currentOutput;
    outputText.innerText = tempText || "Translation will appear here...";

    validateLanguages();

    // Trigger character counter live update
    const currentLength = inputText.value.length;
    charCount.innerText = `${currentLength} / 5000`;
    if (currentLength >= 5000) {
      charCount.style.color = "#ff4d4d";
    } else if (currentLength > 4000) {
      charCount.style.color = "#ffb347";
    } else {
      charCount.style.color = "#a0a0a0";
    }
  });

  // Debounce utility - prevents rapid API calls
  function debounce(fn, delay) {
    return function (...args) {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => fn(...args), delay);
    };
  }

  async function translateText() {
    const text = document.getElementById("inputText").value.trim();
    const output = document.getElementById("outputText");
    const source = sourceLang.value;
    const target = targetLang.value;

    if (!text) {
      showToast("Please enter text to translate.", "warning");
      return;
    }

    // Loading state
    translateBtn.disabled = true;
    translateBtn.style.opacity = "0.7";
    translateBtn.innerHTML = `
      <span class="loader"></span>
      Translating...
    `;
    output.innerHTML = "Translating<span class='animate-pulse'>...</span>";
    output.style.opacity = "0.5";

    try {
      // 1. Hit MyMemory API directly on frontend for ultimate speed & reliability
      const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${source}|${target}`;
      const myMemoryRes = await fetch(url);
      if (!myMemoryRes.ok) throw new Error("MyMemory translation service failed");
      const myMemoryData = await myMemoryRes.json();
      
      if (!myMemoryData || !myMemoryData.responseData) {
        throw new Error("Invalid response from MyMemory API");
      }
      
      const translatedText = myMemoryData.responseData.translatedText;

      // 2. Save translation to backend history & trigger user progress save
      const token = localStorage.getItem("token");
      if (token) {
        try {
          await fetch(`${BASE_URL}/api/translate`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "Authorization": "Bearer " + token
            },
            body: JSON.stringify({ text, targetLang: target, translatedText })
          });
        } catch (saveError) {
          console.warn("Backend save failed, but translation succeeded:", saveError);
        }
      }

      // 3. Update UI
      output.innerText = translatedText;
      output.style.opacity = "1";
      getHistory();

    } catch (err) {
      console.error(err);
      output.innerText = "Translation service unavailable. Please try again.";
      output.style.opacity = "1";
    } finally {
      // Reset button
      translateBtn.disabled = false;
      translateBtn.style.opacity = "1";
      translateBtn.innerHTML = "TRANSLATE";
    }
  }

  // Keydown listener for Ctrl+Enter / Cmd+Enter translation shortcut
  document.getElementById("inputText").addEventListener("keydown", (e) => {
    if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) {
      translateText();
    }
  });

  // FETCH HISTORY
  async function getHistory() {
    const token = localStorage.getItem("token");
    const historyList = document.getElementById("historyList");

    if (!token) {
      window.location.href = "login.html";
      return;
    }

    try {
      const res = await fetch(`${BASE_URL}/api/translate/history`, {
        method: "GET",
        headers: {
          "Authorization": "Bearer " + token
        }
      });

      if (!res.ok) {
        const data = await res.json();
        throw new Error(data.message || "Request failed");
      }
      const history = await res.json();

      if (history.length === 0) {
        historyList.innerHTML = '<p class="italic text-center opacity-70 col-span-full">No history yet — start translating 🚀</p>';
        return;
      }

      historyList.innerHTML = history.map(item => `
        <div class="glass-panel history-card p-6 flex flex-col gap-3 group cursor-pointer" onclick='restoreTranslation(${JSON.stringify(item).replace(/'/g, "&apos;")})'>
          <div class="flex justify-between items-start">
            <span class="text-xs font-label-sm text-outline uppercase tracking-widest">${new Date(item.createdAt).toLocaleDateString()}</span>
            <span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors text-sm">open_in_new</span>
          </div>
          <p class="text-on-surface font-medium line-clamp-1">${item.originalText}</p>
          <p class="text-outline text-sm line-clamp-2 italic">${item.translatedText}</p>
        </div>
      `).join('');

    } catch (err) {
      console.error(err);
      historyList.innerHTML = '<p class="text-error col-span-full">⚠️ Something went wrong. Try again.</p>';
    }
  }

  function restoreTranslation(item) {
    inputText.value = item.originalText;
    outputText.innerText = item.translatedText;
    targetLang.value = item.targetLang || "en";

    // update character count
    const currentLength = item.originalText.length;
    charCount.innerText = `${currentLength} / 5000`;

    showToast("Translation restored", "history");
  }

  // Initial load
  getHistory();

  // Premium Coming Soon Toast Trigger
  function showComingSoonToast() {
    showToast("Feature coming soon in next update.", "lock");
  }

  // Premium Universal Toast System
  function showToast(message, iconName = "info") {
    const toast = document.createElement("div");
    toast.className = "toast-message";
    toast.innerHTML = `
      <span class="material-symbols-outlined text-primary text-[20px]" style="font-variation-settings: 'FILL' 1;">${iconName}</span>
      <span class="font-label-md text-label-md text-on-surface">${message}</span>
    `;
    document.body.appendChild(toast);

    setTimeout(() => {
      toast.classList.add("show");
    }, 100);

    setTimeout(() => {
      toast.classList.remove("show");
      setTimeout(() => {
        toast.remove();
      }, 300);
    }, 2500);
  }
</script>
