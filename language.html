<style>
        .flowing-ink-bg {
            background: linear-gradient(135deg, rgba(18, 20, 22, 1) 0%, rgba(26, 28, 30, 1) 50%, rgba(18, 20, 22, 1) 100%);

            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
        }
        .flowing-ink-bg::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(15, 82, 186, 0.05) 0%, transparent 60%);
            opacity: 0.5;
            pointer-events: none;
        }
        
        .frosted-card {
            background-color: rgba(12, 14, 16, 0.85); /* surface-container-lowest */
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border: 1px solid rgba(226, 226, 229, 0.1); /* on-surface */

            box-shadow: inset 1px 1px 0px 0px rgba(176, 198, 255, 0.2), 1px 1px 2px 0px rgba(0, 0, 0, 0.5); /* surface-tint */

<!-- French -->

</button>
